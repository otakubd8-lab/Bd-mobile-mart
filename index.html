<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD Mobile Mart</title>
</head>
<body>

    <h1>📱 BD Mobile Mart</h1>
    <p>স্বাগতম! এখানে মোবাইল কিনতে পারবেন।</p>

    <hr>

    <!-- প্রোডাক্ট সেকশন -->
    <div>
        <h3>iPhone 15 Pro</h3>
        <p>দাম: ১,২০,০০০ টাকা</p>
        <p>স্টক: উপলভ্য আছে</p>
    </div>

    <hr>

    <!-- অর্ডার ফর্ম -->
    <h3>🛒 অর্ডার করতে নিচের ফর্মটি পূরণ করুন:</h3>
    <form>
        <label>আপনার নাম:</label><br>
        <input type="text" placeholder="এখানে নাম লিখুন" required><br><br>

        <label>মোবাইল নম্বর:</label><br>
        <input type="tel" placeholder="০১৭XXXXXXXX" required><br><br>

        <label>পূর্ণ ঠিকানা:</label><br>
        <textarea placeholder="আপনার ডেলিভারি ঠিকানা লিখুন" required></textarea><br><br>

        <button type="submit">অর্ডার নিশ্চিত করুন</button>
    </form>

</body>
</html>
